name: Build & Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Initialize Flutter project
        run: |
          flutter create -t app --org com.digitaldetox --project-name digital_detox _flutter_init
          cp -r _flutter_init/android mobile-app/android
          cp -r _flutter_init/ios mobile-app/ios
          cp -r _flutter_init/linux mobile-app/linux
          cp -r _flutter_init/macos mobile-app/macos
          cp -r _flutter_init/web mobile-app/web
          cp -r _flutter_init/windows mobile-app/windows
          rm -rf _flutter_init

      - name: Get dependencies
        working-directory: mobile-app
        run: flutter pub get

      - name: Analyze code
        working-directory: mobile-app
        run: flutter analyze --no-fatal-warnings

      - name: Build APK (Debug)
        working-directory: mobile-app
        run: flutter build apk --debug

      - name: Build APK (Release)
        working-directory: mobile-app
        run: |
          flutter build apk --release \
            --dart-define=API_URL=${{ secrets.API_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: digital-detox-apk
          path: mobile-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Initialize Flutter project
        run: |
          flutter create -t app --org com.digitaldetox --project-name digital_detox _flutter_init
          cp -r _flutter_init/android mobile-app/android
          cp -r _flutter_init/ios mobile-app/ios
          rm -rf _flutter_init

      - name: Get dependencies
        working-directory: mobile-app
        run: flutter pub get

      - name: Build Release APK
        working-directory: mobile-app
        run: |
          flutter build apk --release \
            --dart-define=API_URL=${{ secrets.API_URL }}

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' mobile-app/pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Digital Detox v${{ steps.version.outputs.version }}
          body: |
            ## 🎮 Digital Detox - New Release!
            
            ### What's New
            - Latest build from main branch
            
            ### Download
            Download the APK below and install on your Android device.
            
            > Enable "Install from unknown sources" in your Android settings.
          files: mobile-app/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
