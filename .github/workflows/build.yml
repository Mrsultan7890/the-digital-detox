name: Build & Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Initialize Android platform
        run: |
          flutter create -t app --org com.digitaldetox --project-name digital_detox _flutter_init
          cp -r _flutter_init/android mobile-app/android
          rm -rf _flutter_init

      - name: Enable cleartext HTTP for Android
        run: |
          mkdir -p mobile-app/android/app/src/main/res/xml
          cat > mobile-app/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">192.168.0.217</domain>
            </domain-config>
          </network-security-config>
          EOF

      - name: Patch AndroidManifest for cleartext + internet
        run: |
          MANIFEST="mobile-app/android/app/src/main/AndroidManifest.xml"
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"
          grep -q "INTERNET" "$MANIFEST" || sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.INTERNET"\/>\n<\/manifest>/' "$MANIFEST"

      - name: Get dependencies
        working-directory: mobile-app
        run: flutter pub get

      - name: Analyze code
        working-directory: mobile-app
        run: flutter analyze --no-fatal-infos || true

      - name: Build Debug APK
        working-directory: mobile-app
        run: flutter build apk --debug --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Build Release APK
        working-directory: mobile-app
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: digital-detox-debug
          path: mobile-app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: digital-detox-release
          path: mobile-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' mobile-app/pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: digital-detox-release
          path: apk/

      - name: Delete existing release if exists
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --yes 2>/dev/null || true
          git push --delete origin "v${{ steps.version.outputs.version }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Digital Detox v${{ steps.version.outputs.version }}
          body: |
            ## 🎮 Digital Detox - New Release!

            ### Download & Install
            1. Download `app-release.apk` below
            2. Enable **Install from unknown sources** on your Android device
            3. Install and play!

            > Backend: Make sure server is running on `192.168.0.217:8080`
          files: apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
